name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.FRONTEND_IMAGE_NAME || 'cloudroute-lab-frontend' }}
  ECR_REPOSITORY_BACKEND: ${{ vars.BACKEND_IMAGE_NAME || 'cloudroute-lab-backend' }}
  KUBE_CONFIG_SSM_PARAMETER: ${{ vars.KUBE_CONFIG_SSM_PARAMETER || '/terrapilot/cloudroute-lab/dev/kubernetes/kubeconfig/public-b64' }}
  KUBE_NAMESPACE: cloudroute-lab

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./cloudroute-lab-frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./cloudroute-lab-backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_DATA || secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          if aws ssm get-parameter \
            --name "${{ env.KUBE_CONFIG_SSM_PARAMETER }}" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > /tmp/kubeconfig.b64 2>/tmp/kubeconfig-ssm.err; then
            KUBE_CONFIG_B64="$(cat /tmp/kubeconfig.b64)"
            echo "Using kubeconfig from SSM Parameter Store: ${{ env.KUBE_CONFIG_SSM_PARAMETER }}"
          elif [ -n "$KUBE_CONFIG_B64" ]; then
            echo "WARNING: SSM kubeconfig was not available; using fallback GitHub secret KUBE_CONFIG_DATA."
            cat /tmp/kubeconfig-ssm.err
          else
            echo "ERROR: No kubeconfig found in SSM or GitHub secrets."
            cat /tmp/kubeconfig-ssm.err
            exit 1
          fi
          echo "$KUBE_CONFIG_B64" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          echo "Kubernetes API endpoint from kubeconfig:"
          kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}'
          echo
          kubectl version --request-timeout=15s

      - name: Update image tags in manifests
        run: |
          sed -i "s|REPLACE_WITH_ECR_REGISTRY|${{ env.ECR_REGISTRY }}|g" k8s/app/frontend-deployment.yaml
          sed -i "s|REPLACE_WITH_ECR_REGISTRY|${{ env.ECR_REGISTRY }}|g" k8s/app/backend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/app/frontend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/app/backend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/app/namespace.yaml
          kubectl apply -f k8s/app/configmap.yaml
          kubectl create secret docker-registry ecr-registry \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --docker-server=${{ env.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/app/frontend-deployment.yaml
          kubectl apply -f k8s/app/frontend-service.yaml
          kubectl apply -f k8s/app/backend-deployment.yaml
          kubectl apply -f k8s/app/backend-service.yaml
          kubectl apply -f k8s/app/external-api.yaml

      - name: Install Gateway API controller
        run: |
          helm upgrade --install eg oci://docker.io/envoyproxy/gateway-helm \
            --version v1.2.6 \
            --namespace envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 5m

          kubectl wait --for=condition=Established crd/gatewayclasses.gateway.networking.k8s.io --timeout=120s
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=120s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=120s
          kubectl wait --for=condition=Established crd/envoyproxies.gateway.envoyproxy.io --timeout=120s

      - name: Apply Gateway API resources
        run: |
          kubectl apply -f k8s/gateway-api/gatewayclass.yaml
          kubectl apply -f k8s/gateway-api/envoyproxy-nodeport.yaml
          kubectl apply -f k8s/gateway-api/gateway.yaml
          kubectl apply -f k8s/gateway-api/httproute.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/cloudroute-frontend -n ${{ env.KUBE_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/cloudroute-backend -n ${{ env.KUBE_NAMESPACE }} --timeout=300s
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
          kubectl get gateway -n ${{ env.KUBE_NAMESPACE }}
          kubectl get httproute -n ${{ env.KUBE_NAMESPACE }}

      - name: Debug Kubernetes deployment
        if: failure()
        run: |
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }} -o wide || true
          kubectl describe deployment cloudroute-frontend -n ${{ env.KUBE_NAMESPACE }} || true
          kubectl describe deployment cloudroute-backend -n ${{ env.KUBE_NAMESPACE }} || true
          kubectl describe pods -n ${{ env.KUBE_NAMESPACE }} || true
          kubectl get events -n ${{ env.KUBE_NAMESPACE }} --sort-by=.lastTimestamp || true
          kubectl logs -n ${{ env.KUBE_NAMESPACE }} deployment/cloudroute-frontend --all-containers --tail=100 || true
          kubectl logs -n ${{ env.KUBE_NAMESPACE }} deployment/cloudroute-backend --all-containers --tail=100 || true
