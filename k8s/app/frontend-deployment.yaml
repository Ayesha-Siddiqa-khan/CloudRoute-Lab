apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudroute-frontend
  namespace: cloudroute-lab
  labels:
    app: cloudroute-frontend
spec:
  replicas: 1
  strategy:
    # This small lab has one memory-constrained worker. Avoid surge pods during rollout.
    # A deploy can briefly interrupt frontend traffic, but it avoids Insufficient memory failures.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: cloudroute-frontend
  template:
    metadata:
      labels:
        app: cloudroute-frontend
    spec:
      hostNetwork: false
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: frontend
          image: REPLACE_WITH_ECR_REGISTRY/cloudroute-lab-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: cloudroute-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
