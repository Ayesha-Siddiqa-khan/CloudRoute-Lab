apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudroute-config
  namespace: cloudroute-lab
data:
  APP_ENV: "production"
  ALLOWED_ORIGINS: "http://cloudroute-frontend.cloudroute-lab.svc.cluster.local"
  EXTERNAL_SERVICE_ALIAS: "external-api.cloudroute-lab.svc.cluster.local"
  # Empty means browser requests use the same origin, so Gateway API can route /api and /health to the backend.
  NEXT_PUBLIC_API_BASE_URL: ""
