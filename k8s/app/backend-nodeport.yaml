apiVersion: v1
kind: Service
metadata:
  name: cloudroute-backend-nodeport
  namespace: cloudroute-lab
  labels:
    app: cloudroute-backend
  annotations:
    cloudroute-lab/usage: "Optional direct debug access only. The normal external path uses k8s/gateway-api/envoyproxy-nodeport.yaml on nodePort 30080."
spec:
  type: NodePort
  selector:
    app: cloudroute-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 31081
      protocol: TCP
