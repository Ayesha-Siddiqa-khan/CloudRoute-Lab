apiVersion: v1
kind: Service
metadata:
  name: cloudroute-frontend-nodeport
  namespace: cloudroute-lab
  labels:
    app: cloudroute-frontend
  annotations:
    cloudroute-lab/usage: "Optional direct debug access only. The normal external path uses k8s/gateway-api/envoyproxy-nodeport.yaml on nodePort 30080."
spec:
  type: NodePort
  selector:
    app: cloudroute-frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 31080
      protocol: TCP
