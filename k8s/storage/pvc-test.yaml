apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gp3-test-pvc
  namespace: cloudroute-lab
  labels:
    app.kubernetes.io/part-of: cloudroute-lab
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: gp3-test-pod
  namespace: cloudroute-lab
  labels:
    app.kubernetes.io/part-of: cloudroute-lab
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["sh", "-c", "echo cloudroute-lab > /data/test.txt && cat /data/test.txt && sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: gp3-test-pvc
