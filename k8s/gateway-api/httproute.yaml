# HTTPRoute for CloudRoute Lab
# Routes traffic to frontend and backend services.
# Requires Gateway "cloudroute-gateway" to exist first.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cloudroute-route
  namespace: cloudroute-lab
  labels:
    app.kubernetes.io/part-of: cloudroute-lab
spec:
  parentRefs:
    - name: cloudroute-gateway
      sectionName: http
  rules:
    # Backend health endpoints used by probes and the frontend dashboard
    - matches:
        - path:
            type: PathPrefix
            value: /health
        - path:
            type: PathPrefix
            value: /ready
      backendRefs:
        - name: cloudroute-backend
          port: 8000
    # Route /api requests to backend
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: cloudroute-backend
          port: 8000
    # Route all other requests to frontend
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: cloudroute-frontend
          port: 80
