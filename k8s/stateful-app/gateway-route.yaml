# HTTPRoute for stateful-app FastAPI service
# Routes traffic to the FastAPI backend in the stateful-app namespace.
# Requires Gateway API CRDs and a Gateway controller to be installed.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fastapi-route
  namespace: stateful-app
  labels:
    app.kubernetes.io/part-of: cloudroute-lab
spec:
  parentRefs:
    - name: cloudroute-gateway
      namespace: cloudroute-lab
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2
      backendRefs:
        - name: fastapi
          port: 80
